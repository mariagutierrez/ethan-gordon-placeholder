<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan Gordon</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #faf8f5;
      --text: #111;
      --pad:  clamp(28px, 5vw, 72px);
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0e0c; --text: #f0ede8; }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Paper texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }

    /* ── Colour blobs ── */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.38;
      filter: blur(60px);
    }

    /* Each blob gets its own drift + breathe animation */
    @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(6vw,8vh) scale(1.15)} 66%{transform:translate(-4vw,4vh) scale(0.9)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-8vw,5vh) scale(0.9)} 66%{transform:translate(5vw,-6vh) scale(1.1)} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(5vw,-7vh) scale(1.1)} 66%{transform:translate(-6vw,5vh) scale(0.95)} }
    @keyframes drift4 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(7vw,6vh) scale(0.9)} 66%{transform:translate(-5vw,-5vh) scale(1.15)} }
    @keyframes drift5 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-6vw,-7vh) scale(1.1)} 66%{transform:translate(7vw,5vh) scale(0.9)} }
    @keyframes drift6 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(5vw,7vh) scale(1.05)} 66%{transform:translate(-7vw,-4vh) scale(0.92)} }
    @keyframes drift7 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-5vw,6vh) scale(1.12)} 66%{transform:translate(6vw,-5vh) scale(0.88)} }

    .b1 { width:38vw; height:30vw; background:#ff3333; top:-6%;   right:8%;   animation: drift1 11s ease-in-out infinite; }
    .b2 { width:22vw; height:28vw; background:#ff8800; top:10%;  left:38%;   animation: drift2 13s ease-in-out infinite; }
    .b3 { width:32vw; height:22vw; background:#ffe000; top:-4%;  left:-2%;   animation: drift3 12s ease-in-out infinite; }
    .b4 { width:26vw; height:34vw; background:#00cc55; top:38%;  left:-6%;   animation: drift4 14s ease-in-out infinite; }
    .b5 { width:36vw; height:24vw; background:#1166ff; bottom:0%; left:22%;  animation: drift5 12s ease-in-out infinite; }
    .b6 { width:20vw; height:26vw; background:#3300cc; bottom:8%; right:4%;  animation: drift6 13s ease-in-out infinite; }
    .b7 { width:28vw; height:20vw; background:#aa00ff; top:35%;  right:18%;  animation: drift7 10s ease-in-out infinite; }

    /* ── Layout ── */
    .page {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: var(--pad);
      z-index: 1;
    }

    #tagline {
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding-top: clamp(32px, 6vh, 80px);
      padding-bottom: clamp(32px, 5vh, 60px);
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(56px, 13vw, 160px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.02em;
      max-width: 16ch;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #tagline.fading { opacity: 0; }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .domains { display: flex; flex-wrap: wrap; align-items: center; }
    .domains a, .domains span { color: var(--text); opacity: 0.55; text-decoration: none; }
    .domains a:hover { opacity: 1; }
    .domains .sep { opacity: 0.55; margin: 0 8px; }
    .year { color: var(--text); opacity: 0.55; }

    .tiktok {
      position: fixed;
      top: var(--pad); right: var(--pad);
      width: 20px; height: 20px;
      opacity: 1; transition: opacity 0.2s; z-index: 2;
    }
    .tiktok:hover { opacity: 0.5; }
    .tiktok path {
      fill: var(--text);
      opacity: 0.55;
    }

    @media (prefers-color-scheme: dark) {
      .blob { opacity: 0.2; }
      .tiktok path { fill: #333; }
    }
  </style>
</head>
<body>

  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="blob b5"></div>
    <div class="blob b6"></div>
    <div class="blob b7"></div>
  </div>

  <a href="https://tiktok.com/@eg.1230" target="_blank" rel="noopener" class="tiktok" aria-label="TikTok">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
    </svg>
  </a>

  <div class="page">
    <p id="tagline">Making something new.</p>

    <div class="bottom">
      <div class="domains">
        <a href="https://ethangordon.ai">ethangordon.ai</a><span class="sep">/</span>
        <a href="https://ethangordon.art">ethangordon.art</a><span class="sep">/</span>
        <a href="https://ethangordon.me">ethangordon.me</a><span class="sep">/</span>
        <a href="https://ethanjgordon.com">ethanjgordon.com</a><span class="sep">/</span>
        <a href="https://ethan.art">ethan.art</a>
      </div>
      <span class="year">© 2026</span>
    </div>
  </div>

  <script>
    const lines = [
      'Making something new.',
      'Building what\'s next.',
      'Something worth waiting for.',
      'Not yet. But soon.',
      'Good things take time.',
      'Watch this space.',
      'Doing the work.',
      'Worth the wait.',
      'Almost ready.',
      'In progress.',
    ];

    const tagEl = document.getElementById('tagline');
    let lineIndex = 0;

    function cycleTagline() {
      tagEl.classList.add('fading');
      setTimeout(() => {
        lineIndex = (lineIndex + 1) % lines.length;
        tagEl.textContent = lines[lineIndex];
        tagEl.classList.remove('fading');
      }, 450);
    }

    setInterval(cycleTagline, 4000);
  </script>
</body>
</html>
