<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan Gordon</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --bg:      #faf8f5;
      --text:    #111;
      --subtle:  0.55;   /* opacity for secondary elements */
      --pad:     clamp(28px, 5vw, 72px);
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0e0c; --text: #f0ede8; }
    }

    /* Manual override takes precedence over OS setting */
    [data-theme="light"] { --bg: #faf8f5; --text: #111; }
    [data-theme="dark"]  { --bg: #0f0e0c; --text: #f0ede8; }

    /* ── Base ── */
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Paper texture (SVG fractal noise via pseudo-element) ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }

    /* ── Colour blobs ─────────────────────────────────────────
       7 blurred circles (rainbow) that drift and breathe.
       Each blob uses its own @keyframes so movement is
       independent and never looks synchronised.
    ── */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.55;
      filter: blur(60px);
    }

    /* Dark mode blob colours */
    @media (prefers-color-scheme: dark) {
      .blob { opacity: 0.35; }
      .b1 { background: #041556; }
      .b2 { background: #748dc6; }
      .b3 { background: #c3e8ff; }
      .b4 { background: #601414; }
      .b5 { background: #c48f8f; }
    }

    [data-theme="dark"] .blob { opacity: 0.35; }
    [data-theme="dark"] .settings { opacity: 0.85; }

    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) .settings { opacity: 0.85; }
    }
    [data-theme="dark"] .b1 { background: #041556; }
    [data-theme="dark"] .b2 { background: #748dc6; }
    [data-theme="dark"] .b3 { background: #c3e8ff; }
    [data-theme="dark"] .b4 { background: #601414; }
    [data-theme="dark"] .b5 { background: #c48f8f; }

    @keyframes drift1 {
      0%, 100% { transform: translate(0,    0   ) scale(1);    }
      33%       { transform: translate(6vw,  8vh ) scale(1.15); }
      66%       { transform: translate(-4vw, 4vh ) scale(0.9);  }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0,    0   ) scale(1);   }
      33%       { transform: translate(-8vw, 5vh ) scale(0.9); }
      66%       { transform: translate(5vw,  -6vh) scale(1.1); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0,    0   ) scale(1);    }
      33%       { transform: translate(5vw,  -7vh) scale(1.1);  }
      66%       { transform: translate(-6vw, 5vh ) scale(0.95); }
    }
    @keyframes drift4 {
      0%, 100% { transform: translate(0,    0   ) scale(1);    }
      33%       { transform: translate(7vw,  6vh ) scale(0.9);  }
      66%       { transform: translate(-5vw, -5vh) scale(1.15); }
    }
    @keyframes drift5 {
      0%, 100% { transform: translate(0,    0   ) scale(1);   }
      33%       { transform: translate(-6vw, -7vh) scale(1.1); }
      66%       { transform: translate(7vw,  5vh ) scale(0.9); }
    }
    /* Blob positions, sizes and colours */
    .b1 { width:55vw; height:45vw; background:#3e5172; top:-8%;   right:5%;   animation: drift1 11s ease-in-out infinite; } /* navy       */
    .b2 { width:48vw; height:44vw; background:#f9b49b; top:5%;    left:30%;   animation: drift2 13s ease-in-out infinite; } /* salmon     */
    .b3 { width:50vw; height:38vw; background:#9fb6c3; top:-5%;   left:-5%;   animation: drift3 12s ease-in-out infinite; } /* dusty blue */
    .b4 { width:44vw; height:52vw; background:#f9e9de; top:35%;   left:-8%;   animation: drift4 14s ease-in-out infinite; } /* blush      */
    .b5 { width:52vw; height:40vw; background:#cc6c5c; bottom:-4%; left:20%;  animation: drift5 12s ease-in-out infinite; } /* terracotta */

    /* ── Page layout ── */
    .page {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: var(--pad);
      z-index: 1;
    }

    /* ── Tagline ──
       Fades between lines via JS — transition duration (0.4s)
       must be shorter than the JS timeout (450ms) so the new
       text is set while the element is fully invisible.
    ── */
    #tagline {
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding-top: clamp(32px, 6vh, 80px);
      padding-bottom: clamp(32px, 5vh, 60px);
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(56px, 13vw, 160px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.02em;
      max-width: 16ch;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #tagline.fading { opacity: 0; }

    /* ── Bottom bar ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .domains { display: flex; flex-wrap: wrap; align-items: center; }

    .domains a,
    .domains .sep { color: var(--text); opacity: var(--subtle); }

    .lang-switcher { display: flex; align-items: center; }

    .lang {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: var(--subtle);
      padding: 0;
      transition: opacity 0.2s;
    }

    .lang:hover  { opacity: 0.8; }
    .lang.active { opacity: 1; font-weight: 700; }

    .domains a { text-decoration: none; }
    .domains a:hover { opacity: 1; }
    .domains .sep { margin: 0 8px; }

    /* ── Settings bar (top-right, fixed) ── */
    .settings {
      position: fixed;
      top: var(--pad);
      right: var(--pad);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 2;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .settings-sep {
      color: var(--text);
      opacity: 0.25;
    }

    #theme-toggle {
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      opacity: var(--subtle);
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #theme-toggle:hover { opacity: 1; }
    #theme-toggle svg { transition: transform 0.3s ease; stroke: var(--text); }
    #theme-toggle:hover svg { transform: rotate(20deg); }

    /* ── TikTok icon (inline, after ethan.art) ── */
    .tiktok-inline {
      display: inline-flex;
      align-items: center;
      opacity: var(--subtle);
      transition: opacity 0.2s;
    }

    .tiktok-inline:hover { opacity: 1; }

    .tiktok-inline path { fill: var(--text); }
  </style>
</head>
<body>

  <!-- Settings bar: language + theme toggle -->
  <div class="settings">
    <button data-lang="en" class="lang active">EN</button>
    <span class="settings-sep">/</span>
    <button data-lang="es" class="lang">ES</button>
    <span class="settings-sep">·</span>
    <button id="theme-toggle" aria-label="Toggle dark mode">
      <svg id="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2"  x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
        <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
      </svg>
      <svg id="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
      </svg>
    </button>
  </div>

  <!-- Animated colour blobs (rainbow, behind everything) -->
  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="blob b5"></div>
  </div>


  <!-- Main content -->
  <div class="page">
    <p id="tagline">Making something new.</p>

    <div class="bottom">
      <div class="domains">
        <a href="https://ethangordon.ai">ethangordon.ai</a><span class="sep">/</span>
        <a href="https://ethangordon.art">ethangordon.art</a><span class="sep">/</span>
        <a href="https://ethangordon.me">ethangordon.me</a><span class="sep">/</span>
        <a href="https://ethanjgordon.com">ethanjgordon.com</a><span class="sep">/</span>
        <a href="https://ethan.art">ethan.art</a><span class="sep">/</span>
        <a href="https://tiktok.com/@eg.1230" target="_blank" rel="noopener" aria-label="TikTok" class="tiktok-inline">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Rotating taglines — cycle every 4s with a fade transition.
    // Timeout (450ms) > transition duration (400ms) so text updates
    // while the element is fully transparent.
    const taglines = {
      en: [
        'Making something new.',
        'Building what\'s next.',
        'Something worth waiting for.',
        'Not yet. But soon.',
        'Good things take time.',
        'Watch this space.',
        'Doing the work.',
        'Worth the wait.',
        'Almost ready.',
        'In progress.',
      ],
      es: [
        'Creando algo nuevo.',
        'Construyendo lo que viene.',
        'Algo que vale la pena esperar.',
        'Todavía no. Pero pronto.',
        'Las cosas buenas llevan su tiempo.',
        'Aquí está pasando algo.',
        'Trabajando en ello.',
        'Vale la pena.',
        'Casi listo.',
        'En progreso.',
      ],
    };

    const tagEl   = document.getElementById('tagline');
    const langBtns = document.querySelectorAll('.lang');
    let lang      = 'en';
    let lineIndex = 0;

    function setLine(index, animate = false) {
      if (animate) tagEl.classList.add('fading');
      setTimeout(() => {
        tagEl.textContent = taglines[lang][index];
        tagEl.classList.remove('fading');
      }, animate ? 450 : 0); // must exceed the CSS transition duration (0.4s = 400ms)
    }

    function cycleTagline() {
      lineIndex = (lineIndex + 1) % taglines[lang].length;
      setLine(lineIndex, true);
    }

    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.lang === lang) return;
        lang = btn.dataset.lang;
        langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        lineIndex = 0;
        setLine(lineIndex, true);
      });
    });

    setInterval(cycleTagline, 4000);

    // Theme toggle — respects OS default, overrides on click
    const html          = document.documentElement;
    const themeToggle   = document.getElementById('theme-toggle');
    const iconSun       = document.getElementById('icon-sun');
    const iconMoon      = document.getElementById('icon-moon');
    const osPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function isDark() {
      const t = html.dataset.theme;
      return t ? t === 'dark' : osPrefersDark;
    }

    function updateIcon() {
      iconSun.style.display  = isDark() ? 'none'  : 'block';
      iconMoon.style.display = isDark() ? 'block' : 'none';
    }

    updateIcon(); // set correct icon on load

    themeToggle.addEventListener('click', () => {
      html.dataset.theme = isDark() ? 'light' : 'dark';
      updateIcon();
    });
  </script>
</body>
</html>
